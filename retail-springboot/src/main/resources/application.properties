# ─── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ─── Application name ──────────────────────────────────────────────────────────
spring.application.name=retail-springboot

# ─── DataSource ────────────────────────────────────────────────────────────────
# All three values read from environment variables at runtime.
# Local fallbacks are provided so the app still starts during development.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/customerproductmgmtdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── SQL Initialisation ────────────────────────────────────────────────────────
# Set to 'always' only when you need to seed the DB on first boot;
# in production set to 'never' and manage schema separately.
spring.sql.init.mode=never

# ─── Actuator / Health ─────────────────────────────────────────────────────────
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=always

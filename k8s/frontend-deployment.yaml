apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-frontend
  labels:
    app: retail-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retail-frontend
  template:
    metadata:
      labels:
        app: retail-frontend
    spec:
      containers:
        - name: retail-frontend
          # Replace <ACCOUNT_ID> and <REGION> with your AWS values
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/retail-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_HOST
              value: retail-backend-svc:8080
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: retail-frontend-svc
spec:
  selector:
    app: retail-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
